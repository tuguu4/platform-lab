name: platform_lab
version: "1.0.0"
config-version: 2

profile: platform_lab

# Paths
model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

target-path:   "target"
clean-targets: ["target", "dbt_packages"]

# Model defaults
models:
  platform_lab:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts

services:

  # ── MinIO (S3-compatible object storage) ──────────────────────────
  minio:
    image: minio/minio:latest
    container_name: platform-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # ── MinIO bucket initialisation (runs once, then exits) ───────────
  minio-init:
    image: minio/mc:latest
    container_name: platform-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing local/raw-data &&
        mc mb --ignore-existing local/iceberg &&
        mc mb --ignore-existing local/dbt-artifacts &&
        echo 'Buckets ready.' && exit 0
      "

  # ── Prefect server (workflow orchestration) ───────────────────────
  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: platform-prefect
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"   # Prefect UI → http://localhost:4200
    environment:
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_UI_API_URL: "http://localhost:4200/api"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ── MCP server (Groq + DuckDB NL→SQL) ────────────────────────────
  mcp-server:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    container_name: platform-mcp
    ports:
      - "8000:8000"   # SSE endpoint → http://localhost:8000
    environment:
      GROQ_API_KEY:    ${GROQ_API_KEY}
      MCP_TRANSPORT:   sse
      DUCKDB_PATH:     /data/warehouse.duckdb
      MINIO_ENDPOINT:  minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PREFECT_API_URL:  http://prefect-server:4200/api
    volumes:
      - ./data:/data      # shared DuckDB warehouse file
      - ./mcp:/app        # live-reload during development
    depends_on:
      - minio
      - prefect-server
    restart: unless-stopped

  # ── Chat UI (React + Vite + Express MCP proxy) ───────────────────
  chat-ui:
    build:
      context: ./chat-ui
      dockerfile: Dockerfile
    container_name: platform-chat
    ports:
      - "3000:3000"   # Web UI → http://localhost:3000
    environment:
      MCP_URL: http://mcp-server:8000/sse
    depends_on:
      - mcp-server
    restart: unless-stopped

volumes:
  minio_data:
  prefect_data:
